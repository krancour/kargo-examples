---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: kargo-demo-19
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: kargo-demo-19
  namespace: kargo-demo-19
spec:
  promotionPolicies:
  - stageSelector:
      name: test
    autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: kargo-demo
  namespace: kargo-demo-19
spec:
  subscriptions:
  - git:
      repoURL: https://github.com/<github-username>/kargo-demo-gitops.git
      branch: kustomize
  - image:
      repoURL: public.ecr.aws/nginx/nginx
      constraint: ^1.29.0
      strictSemvers: true
      discoveryLimit: 3
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: test
  namespace: kargo-demo-19
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: kargo-demo
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/<github-username>/kargo-demo-gitops.git
      - name: imageRepo
        value: public.ecr.aws/nginx/nginx
      - name: targetBranch
        value: 19/stage/${{ ctx.stage }}
      - name: outPath
        value: ./out
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          author:
            name: Kargo Demo Bot
            email: kargo-demo@example.com
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ${{ vars.outPath }}
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: kustomize-set-image
        as: update-image
        config:
          path: ./src/base
          images:
          - image: ${{ vars.imageRepo }}
            tag: ${{ imageFrom(vars.imageRepo).Tag }}
      - uses: kustomize-build
        config:
          path: ./src/stages/${{ ctx.stage }}
          outPath: ${{ vars.outPath }}
      - uses: git-commit
        as: commit
        config:
          path: ${{ vars.outPath }}
          message: ${{ outputs['update-image'].commitMessage }}
      - uses: git-push
        as: push
        config:
          path: ${{ vars.outPath }}
      - uses: argocd-update
        config:
          apps:
          - name: ${{ ctx.project }}-${{ ctx.stage }}
            sources:
            - repoURL: ${{ vars.gitRepo }}
              desiredRevision: ${{ outputs.push.commit }}
      # The novel bit: argocd-wait blocks until the app is healthy,
      # synced, and operationally idle. `waitFor` conditions in the
      # health family (health, suspended, degraded) are OR'd; others
      # are AND'd.
      #
      # Selector-based alternative (mutually exclusive with `name`):
      #   - selector:
      #       matchLabels:
      #         kargo.akuity.io/project: ${{ ctx.project }}
      #         kargo.akuity.io/stage: ${{ ctx.stage }}
      #     namespace: argocd
      #     waitFor: [health, sync]
      - uses: argocd-wait
        config:
          apps:
          - name: ${{ ctx.project }}-${{ ctx.stage }}
            namespace: argocd
            waitFor: [health, sync, operation]
