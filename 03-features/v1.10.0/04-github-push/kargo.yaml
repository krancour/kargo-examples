---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: signing-keys-demo
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: signing-keys-demo
  namespace: signing-keys-demo
spec:
  promotionPolicies:
  - stageSelector:
      name: test
    autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: kargo-demo
  namespace: signing-keys-demo
spec:
  subscriptions:
  - git:
      repoURL: https://github.com/<github-username>/kargo-demo-gitops.git
      branch: kustomize
  - image:
      repoURL: public.ecr.aws/nginx/nginx
      constraint: ^1.29.0
      strictSemvers: true
      discoveryLimit: 3
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: test
  namespace: signing-keys-demo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: kargo-demo
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/<github-username>/kargo-demo-gitops.git
      - name: imageRepo
        value: public.ecr.aws/nginx/nginx
      - name: targetBranch
        value: signing-keys-demo-7/stage/${{ ctx.stage }}
      - name: outPath
        value: ./out
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - commit: ${{ commitFrom(vars.gitRepo).ID }}
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ${{ vars.outPath }}
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: kustomize-set-image
        config:
          path: ./src/base
          images:
          - image: ${{ vars.imageRepo }}
            tag: ${{ imageFrom(vars.imageRepo).Tag }}
      # --- foo test: 20 signed commits against the same worktree's .gnupg --
      # Commit 1 (build)
      - uses: kustomize-build
        config:
          path: ./src/stages/${{ ctx.stage }}
          outPath: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 1 (build)
      # Commit 2 (clear)
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 2 (clear)
      # Commit 3 (build)
      - uses: kustomize-build
        config:
          path: ./src/stages/${{ ctx.stage }}
          outPath: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 3 (build)
      # Commit 4 (clear)
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 4 (clear)
      # Commit 5 (build)
      - uses: kustomize-build
        config:
          path: ./src/stages/${{ ctx.stage }}
          outPath: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 5 (build)
      # Commit 6 (clear)
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 6 (clear)
      # Commit 7 (build)
      - uses: kustomize-build
        config:
          path: ./src/stages/${{ ctx.stage }}
          outPath: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 7 (build)
      # Commit 8 (clear)
      - uses: git-clear
        config:
          path: ${{ vars.outPath }}
      - uses: git-commit
        config:
          path: ${{ vars.outPath }}
          message: foo commit 8 (clear)
      # # Commit 9 (build)
      # - uses: kustomize-build
      #   config:
      #     path: ./src/stages/${{ ctx.stage }}
      #     outPath: ${{ vars.outPath }}
      # - uses: git-commit
      #   config:
      #     path: ${{ vars.outPath }}
      #     message: foo commit 9 (build)
      # NB: github-push intentionally commented out to avoid pushing 60 foo
      # commits to the remote each time this is exercised. Re-enable if you
      # want to verify the end-to-end path.
      - uses: github-push
        as: push
        config:
          path: ${{ vars.outPath }}
      # - uses: argocd-update
      #   config:
      #     apps:
      #     - name: ${{ ctx.project }}-${{ ctx.stage }}
      #       sources:
      #       - repoURL: ${{ vars.gitRepo }}
      #         desiredRevision: ${{ outputs.push.commit }}
